<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaamQuick | Premium Services</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f8fafc">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .ambient-bg {
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,0.03) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,0.03) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,30%,0.03) 0, transparent 50%);
            background-attachment: fixed;
        }
        .glass-panel { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .no-arrow { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        input, select, textarea { font-size: 16px !important; transition: all 0.3s ease; }
        ::-webkit-scrollbar { display: none; }
        .star-active { color: #F59E0B; }
        .star-inactive { color: #E2E8F0; }
        optgroup { font-weight: 700; color: #4F46E5; background: #fff; }
        option { font-weight: 500; color: #1e293b; }
        
        /* Custom Slider Styling */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #E2E8F0; border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { height: 24px; width: 24px; border-radius: 50%; background: #4F46E5; cursor: pointer; -webkit-appearance: none; margin-top: -8px; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4); }
    </style>
</head>
<body class="ambient-bg text-slate-800 min-h-screen relative overflow-x-hidden pb-24" x-data="app()">

    <header class="sticky top-0 z-50 glass-panel border-b border-white/40 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="relative z-10">
            <h1 @mousedown="adminTimer = setTimeout(() => showAdmin = !showAdmin, 2000)" 
                @mouseup="clearTimeout(adminTimer)"
                @touchstart="adminTimer = setTimeout(() => showAdmin = !showAdmin, 2000)"
                @touchend="clearTimeout(adminTimer)"
                class="text-2xl font-extrabold bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent tracking-tight leading-none mb-1 cursor-pointer select-none">
                KaamQuick
            </h1>
            <div class="flex items-center">
                <span class="mr-1 text-[13px]">📍</span>
                <select x-model="userCity" class="no-arrow bg-transparent text-[11px] font-extrabold uppercase tracking-widest text-slate-500 outline-none cursor-pointer">
                    <option value="Satna">Satna</option>
                    <option value="Rewa">Rewa</option>
                    <option value="Indore">Indore</option>
                </select>
            </div>
        </div>
        
        <div x-show="showAdmin" class="absolute top-16 left-6 right-6 glass-panel p-4 rounded-2xl shadow-xl border-indigo-200 z-[60]" style="display: none;">
            <div class="flex justify-between items-center mb-2">
                <h4 class="font-bold text-indigo-600 text-xs uppercase tracking-widest">Himanshu's Profit (10%)</h4>
                <button @click="showAdmin = false" class="text-slate-400">✕</button>
            </div>
            <p class="text-2xl font-black text-slate-900">₹<span x-text="adminEarnings.toFixed(2)"></span></p>
            <p class="text-[10px] text-slate-500 font-medium">Total Platform Commission Collected</p>
        </div>
    </header>

    <main class="p-6 max-w-md mx-auto relative z-10">
        <div x-show="step === 'home'">
            <div class="mb-8 mt-2">
                <h2 class="text-[32px] font-extrabold leading-[1.15] tracking-tight">Expert services in <br><span class="bg-gradient-to-r from-indigo-600 to-violet-500 bg-clip-text text-transparent" x-text="userCity"></span></h2>
            </div>
            <div class="space-y-4">
                <template x-for="service in services" :key="service.name">
                    <button @click="selectService(service)" class="w-full glass-panel p-5 rounded-[2rem] shadow-sm flex items-center space-x-5 active:scale-[0.97] transition-all text-left">
                        <div class="w-16 h-16 rounded-[1.25rem] bg-gradient-to-br from-indigo-50 to-violet-100 flex items-center justify-center text-3xl shadow-inner border border-white" x-text="service.icon"></div>
                        <div>
                            <h3 class="text-lg font-bold text-slate-800" x-text="service.name"></h3>
                            <p class="text-slate-400 text-sm font-medium mt-0.5">View available pros</p>
                        </div>
                    </button>
                </template>
            </div>
        </div>

        <div x-show="step === 'booking'" style="display: none;">
            <div class="space-y-6">
                <button @click="step = 'home'" class="text-indigo-600 font-bold text-sm bg-indigo-50 px-4 py-2 rounded-full">← Back</button>
                <h2 class="text-3xl font-extrabold text-slate-800">Job <span class="bg-gradient-to-r from-indigo-600 to-violet-500 bg-clip-text text-transparent">Details</span></h2>

                <form @submit.prevent="proceedToChooseWorker()" class="space-y-5">
                    <div class="glass-panel p-6 rounded-[2rem] shadow-sm space-y-6">
                        <input required x-model="formData.name" type="text" placeholder="Full Name" class="w-full p-4 bg-white/60 border border-slate-200 rounded-2xl outline-none">
                        
                        <div class="space-y-3">
                            <div class="flex justify-between items-center">
                                <label class="text-sm font-bold text-slate-600">Offered Price</label>
                                <span class="text-lg font-black text-indigo-600">₹<span x-text="formData.price"></span></span>
                            </div>
                            <input type="range" min="300" max="5000" step="50" x-model="formData.price" class="w-full">
                            <div class="flex justify-between text-[10px] text-slate-400 font-bold uppercase">
                                <span>Min: 300</span>
                                <span>Max: 5000</span>
                            </div>
                        </div>

                        <textarea required x-model="formData.address" placeholder="Address" class="w-full p-4 bg-white/60 border border-slate-200 rounded-2xl outline-none"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold text-lg py-5 rounded-[1.5rem] shadow-lg">Find Available Pros</button>
                </form>
            </div>
        </div>

        <div x-show="step === 'provider'" style="display: none;">
            <div x-show="isProviderLogged" class="space-y-6">
                <div class="glass-panel p-5 rounded-[2rem] shadow-sm flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <div class="w-14 h-14 bg-indigo-600 text-white rounded-full flex items-center justify-center font-bold text-2xl uppercase" x-text="proData.name.charAt(0)"></div>
                        <div>
                            <h2 class="text-xl font-extrabold text-slate-800" x-text="proData.name"></h2>
                            <p class="text-indigo-600 font-bold text-xs" x-text="proData.skill"></p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="glass-panel p-4 rounded-2xl text-center">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Your Net Earning</p>
                        <p class="text-xl font-black text-emerald-600 mt-1">₹<span x-text="proData.earnings.lifetime.toFixed(2)"></span></p>
                    </div>
                    <div class="glass-panel p-4 rounded-2xl text-center">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Jobs Done</p>
                        <p class="text-xl font-black text-indigo-600 mt-1" x-text="proData.jobs"></p>
                    </div>
                </div>
                
                <p class="text-center text-[10px] text-slate-400 italic mt-2">Platform Fee (10%) is automatically deducted from payouts.</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 z-50 px-6 pb-6 pt-4 bg-gradient-to-t from-[#f8fafc] to-transparent">
        <div class="glass-panel rounded-[2rem] px-8 py-4 flex justify-around items-center shadow-lg">
            <button @click="step = 'home'" :class="step === 'home' ? 'text-indigo-600' : 'text-slate-400'" class="flex flex-col items-center">
                <span class="text-[10px] font-extrabold mt-1 uppercase">Customer</span>
            </button>
            <button @click="step = 'provider'" :class="step === 'provider' ? 'text-indigo-600' : 'text-slate-400'" class="flex flex-col items-center">
                <span class="text-[10px] font-extrabold mt-1 uppercase">Worker</span>
            </button>
        </div>
    </nav>

    <script>
        function app() {
            return {
                step: 'home',
                userCity: 'Satna',
                showAdmin: false,
                adminTimer: null,
                adminEarnings: 0, // Your profit
                commissionRate: 0.10, // 10% commission

                services: [
                    { name: 'Electrician', icon: '⚡', issues: ['AC Repair', 'Wiring'] },
                    { name: 'Maid', icon: '🧹', issues: ['Cleaning', 'Cooking'] }
                ],
                
                formData: { name: '', address: '', issue: '', price: 500 }, // Default price 500
                proData: { 
                    id: 999, name: 'Himanshu Singh', skill: 'Electrician', 
                    rating: 5.0, jobs: 0, isOnline: true,
                    earnings: { today: 0, month: 0, lifetime: 0 }
                },
                isProviderLogged: true,

                selectService(service) {
                    this.selectedService = service;
                    this.step = 'booking';
                },

                proceedToChooseWorker() {
                    // Simulation: Hiring yourself for testing
                    let amount = parseInt(this.formData.price);
                    let platformFee = amount * this.commissionRate;
                    let workerNet = amount - platformFee;

                    // Update Admin Earnings (Secret)
                    this.adminEarnings += platformFee;

                    // Update Worker Data (Net)
                    this.proData.earnings.lifetime += workerNet;
                    this.proData.jobs += 1;

                    alert(`Job Posted for ₹${amount}!\nWorker Earning: ₹${workerNet}\nAdmin Commission: ₹${platformFee}`);
                    this.step = 'home';
                }
            }
        }
    </script>
</body>
</html>
