<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaamQuick | Himanshu's Platform</title>
    <meta name="theme-color" content="#4F46E5">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .service-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .service-card:active { transform: scale(0.95); }
        input[type=range] { -webkit-appearance: none; width: 100%; height: 10px; background: #e2e8f0; border-radius: 5px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 26px; height: 26px; background: #4F46E5; border-radius: 50%; border: 4px solid white; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3); }
    </style>
</head>
<body x-data="kaamQuick()">

    <header class="p-6 pt-10 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">KaamQuick</h1>
            <p class="text-indigo-600 font-bold text-sm tracking-wide">Fast & Trusted Services</p>
        </div>
    </header>

    <main class="px-6 pb-20">
        
        <div x-show="step === 'home'" class="space-y-5">
            <template x-for="service in services" :key="service.name">
                <button @click="selectService(service)" 
                    class="w-full service-card bg-white p-7 rounded-[2.5rem] flex items-center shadow-sm border border-slate-100">
                    <div class="text-5xl mr-6" x-text="service.icon"></div>
                    <div class="text-left">
                        <h3 class="text-xl font-extrabold text-slate-800" x-text="service.name"></h3>
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">Book Now</p>
                    </div>
                    <div class="ml-auto bg-slate-50 p-3 rounded-full text-indigo-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                    </div>
                </button>
            </template>
        </div>

        <div x-show="step === 'booking'" style="display: none;" class="space-y-6">
            <button @click="step = 'home'" class="text-indigo-600 font-bold flex items-center bg-indigo-50 px-4 py-2 rounded-full w-fit">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg> Back
            </button>
            
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-50 space-y-6">
                <h2 class="text-2xl font-black text-slate-800">Booking <span class="text-indigo-600" x-text="selectedService?.name"></span></h2>
                
                <div class="space-y-4">
                    <input x-model="form.name" type="text" placeholder="Customer Name" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-indigo-200 transition-all">
                    <input x-model="form.phone" type="tel" placeholder="Mobile Number" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-indigo-200 transition-all">
                    <textarea x-model="form.address" placeholder="Service Address" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-indigo-200 transition-all"></textarea>
                </div>

                <div class="p-6 bg-indigo-50/50 rounded-3xl border border-indigo-100">
                    <div class="flex justify-between items-end mb-4">
                        <label class="text-xs font-black text-indigo-900 uppercase tracking-widest">Service Budget</label>
                        <div class="text-right">
                            <span class="text-3xl font-black text-indigo-600">₹<span x-text="form.price"></span></span>
                        </div>
                    </div>
                    <input type="range" min="300" max="10000" step="100" x-model="form.price" class="mb-4">
                    
                    <div class="pt-4 border-t border-indigo-100 space-y-2">
                        <div class="flex justify-between text-[11px] font-bold">
                            <span class="text-slate-500 uppercase">Worker Pay (90%):</span>
                            <span class="text-slate-700">₹<span x-text="Math.floor(form.price * 0.9)"></span></span>
                        </div>
                        <div class="flex justify-between text-[11px] font-bold">
                            <span class="text-indigo-600 uppercase tracking-tighter italic">Your Commission (10%):</span>
                            <span class="text-indigo-600">₹<span x-text="Math.floor(form.price * 0.1)"></span></span>
                        </div>
                    </div>
                </div>

                <button @click="confirmBooking()" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-lg active:scale-95 transition-transform text-lg">Confirm & Connect</button>
            </div>
        </div>

        <div x-show="step === 'confirmed'" style="display: none;" class="text-center space-y-8 pt-10">
            <div class="relative inline-block">
                <div class="w-24 h-24 bg-emerald-500 text-white rounded-full flex items-center justify-center mx-auto text-4xl shadow-2xl shadow-emerald-200">✓</div>
                <div class="absolute -top-2 -right-2 w-8 h-8 bg-amber-400 rounded-full flex items-center justify-center border-4 border-white">✨</div>
            </div>
            
            <div>
                <h2 class="text-3xl font-black text-slate-900 leading-tight">Expert Notified!</h2>
                <p class="text-slate-500 font-medium mt-2 px-10">We've shared your request. Please contact below.</p>
            </div>

            <div class="space-y-4 px-2">
                <a :href="'tel:' + '91XXXXXXXXXX'" class="block w-full bg-indigo-600 text-white font-bold py-5 rounded-[1.5rem] shadow-xl shadow-indigo-100">📞 Direct Call</a>
                <button @click="openWhatsApp()" class="w-full bg-emerald-500 text-white font-bold py-5 rounded-[1.5rem] shadow-xl shadow-emerald-100 flex items-center justify-center">
                   WhatsApp Details
                </button>
                <button @click="step = 'home'" class="w-full text-slate-400 font-bold py-4">Back to Menu</button>
            </div>
        </div>

    </main>

    <script>
        function kaamQuick() {
            return {
                step: 'home',
                selectedService: null,
                form: {
                    name: '',
                    phone: '',
                    address: '',
                    price: 500
                },
                services: [
                    { name: 'Electrician', icon: '⚡' },
                    { name: 'Maid', icon: '🧹' },
                    { name: 'Car Repair', icon: '🚗' }
                ],
                selectService(service) {
                    this.selectedService = service;
                    this.step = 'booking';
                    window.scrollTo({top: 0, behavior: 'smooth'});
                },
                confirmBooking() {
                    if(!this.form.name || !this.form.phone) {
                        alert("Please fill name and phone!");
                        return;
                    }
                    this.step = 'confirmed';
                },
                openWhatsApp() {
                    let commission = Math.floor(this.form.price * 0.1);
                    let workerPay = this.form.price - commission;
                    let msg = `*NEW BOOKING: ${this.selectedService.name}*\n\n` +
                              `👤 *Customer:* ${this.form.name}\n` +
                              `📞 *Phone:* ${this.form.phone}\n` +
                              `📍 *Address:* ${this.form.address}\n\n` +
                              `💰 *Total Budget:* ₹${this.form.price}\n` +
                              `--------------------------\n` +
                              `✅ *Worker Earning:* ₹${workerPay}\n` +
                              `✅ *Platform Fee:* ₹${commission}`;
                    
                    window.open(`https://wa.me/91XXXXXXXXXX?text=${encodeURIComponent(msg)}`);
                }
            }
        }
    </script>
</body>
</html>
