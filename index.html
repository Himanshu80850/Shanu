<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaamQuick | Premium Services</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f8fafc">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .ambient-bg {
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,0.03) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,0.03) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,30%,0.03) 0, transparent 50%);
            background-attachment: fixed;
        }
        .glass-panel { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .no-arrow { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        input, select, textarea { font-size: 16px !important; transition: all 0.3s ease; }
        ::-webkit-scrollbar { display: none; }
        .star-active { color: #F59E0B; }
        .star-inactive { color: #E2E8F0; }
        optgroup { font-weight: 700; color: #4F46E5; background: #fff; }
        option { font-weight: 500; color: #1e293b; }
    </style>
</head>
<body class="ambient-bg text-slate-800 min-h-screen relative overflow-x-hidden pb-24" x-data="app()">

    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-indigo-300 rounded-full mix-blend-multiply filter blur-[100px] opacity-30 z-0 pointer-events-none"></div>
    <div class="fixed top-[20%] right-[-10%] w-96 h-96 bg-violet-300 rounded-full mix-blend-multiply filter blur-[100px] opacity-30 z-0 pointer-events-none"></div>

    <header class="sticky top-0 z-50 glass-panel border-b border-white/40 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="relative z-10">
            <h1 class="text-2xl font-extrabold bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent tracking-tight leading-none mb-1">KaamQuick</h1>
            <div class="flex items-center">
                <span class="mr-1 text-[13px]">📍</span>
                <select x-model="userCity" class="no-arrow bg-transparent text-[11px] font-extrabold uppercase tracking-widest text-slate-500 outline-none cursor-pointer">
                    <optgroup label="⭐ Prime Cities">
                        <option value="Delhi NCR">Delhi NCR</option>
                        <option value="Gurugram">Gurugram</option>
                        <option value="Noida">Noida</option>
                        <option value="Mumbai">Mumbai</option>
                        <option value="Bangalore">Bangalore</option>
                        <option value="Hyderabad">Hyderabad</option>
                        <option value="Chennai">Chennai</option>
                        <option value="Pune">Pune</option>
                    </optgroup>
                    <optgroup label="📍 Other Cities">
                        <option value="Indore">Indore</option>
                        <option value="Bhopal">Bhopal</option>
                        <option value="Jabalpur">Jabalpur</option>
                        <option value="Rewa">Rewa</option>
                        <option value="Satna">Satna</option>
                    </optgroup>
                </select>
                <svg class="w-3 h-3 text-slate-400 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
            </div>
        </div>
        <button @click="step = 'settings'" class="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-sm border border-slate-100 active:scale-90 transition-all z-10 text-slate-600 hover:text-indigo-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37a1.724 1.724 0 002.572-1.065z"></path></svg>
        </button>
    </header>

    <main class="p-6 max-w-md mx-auto relative z-10">
        
        <div x-show="step === 'home'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-6" x-transition:enter-end="opacity-100 translate-y-0" style="display: none;">
            <div class="mb-8 mt-2">
                <h2 class="text-[32px] font-extrabold leading-[1.15] tracking-tight">Expert services in <br><span class="bg-gradient-to-r from-indigo-600 to-violet-500 bg-clip-text text-transparent" x-text="userCity"></span></h2>
            </div>
            <div class="space-y-4">
                <template x-for="service in services" :key="service.name">
                    <button @click="selectService(service)" class="w-full glass-panel p-5 rounded-[2rem] shadow-sm flex items-center space-x-5 active:scale-[0.97] transition-all text-left">
                        <div class="w-16 h-16 rounded-[1.25rem] bg-gradient-to-br from-indigo-50 to-violet-100 flex items-center justify-center text-3xl shadow-inner border border-white" x-text="service.icon"></div>
                        <div>
                            <h3 class="text-lg font-bold text-slate-800" x-text="service.name"></h3>
                            <p class="text-slate-400 text-sm font-medium mt-0.5">View available pros</p>
                        </div>
                        <div class="ml-auto text-indigo-400">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </div>
                    </button>
                </template>
            </div>
        </div>

        <div x-show="step === 'booking'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-6" x-transition:enter-end="opacity-100 translate-y-0" style="display: none;">
            <div class="space-y-6">
                <button @click="step = 'home'" class="flex items-center text-indigo-600 font-bold text-sm tracking-wide bg-indigo-50 px-4 py-2 rounded-full active:scale-95 transition-transform w-max">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg> Back
                </button>
                <h2 class="text-3xl font-extrabold text-slate-800">Job <span class="bg-gradient-to-r from-indigo-600 to-violet-500 bg-clip-text text-transparent">Details</span></h2>

                <form @submit.prevent="proceedToChooseWorker()" class="space-y-5">
    <div>
        <label class="block text-sm font-medium text-gray-700">Set Your Price</label>
        <input type="number" x-model="formData.offerPrice" name="offerPrice" placeholder="Offer Price" class="w-full p-2 border rounded-md" required>
    </div>
                    <div class="glass-panel p-6 rounded-[2rem] shadow-sm space-y-4">
                        <input required x-model="formData.name" type="text" placeholder="Full Name" class="w-full p-4 bg-white/60 border border-slate-200 rounded-2xl outline-none focus:border-indigo-500">
                        <textarea required x-model="formData.address" placeholder="Complete Address" class="w-full p-4 bg-white/60 border border-slate-200 rounded-2xl outline-none focus:border-indigo-500 min-h-[80px]"></textarea>
                        
                        <div class="relative">
                            <select required x-model="formData.issue" class="no-arrow w-full p-4 bg-white/60 border border-slate-200 rounded-2xl outline-none focus:border-indigo-500 text-slate-700">
                                <option value="" disabled selected>Select Specific Issue</option>
                                <template x-for="issue in selectedService?.issues">
                                    <option :value="issue" x-text="issue"></option>
                                </template>
                            </select>
                            <svg class="w-5 h-5 text-slate-400 absolute right-4 top-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-bold text-lg py-5 rounded-[1.5rem] shadow-lg active:scale-[0.98] transition-all">Find Available Pros</button>
                </form>
            </div>
        </div>

        <div x-show="step === 'choose_worker'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-6" x-transition:enter-end="opacity-100 translate-y-0" style="display: none;">
            <div class="space-y-6">
                <button @click="step = 'booking'" class="flex items-center text-indigo-600 font-bold text-sm tracking-wide bg-indigo-50 px-4 py-2 rounded-full active:scale-95 transition-transform w-max">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg> Back
                </button>
                <h2 class="text-3xl font-extrabold text-slate-800">Available <span class="bg-gradient-to-r from-indigo-600 to-violet-500 bg-clip-text text-transparent">Pros</span></h2>

                <div class="space-y-4">
                    <template x-if="getAvailableWorkers().length === 0">
                        <div class="text-center p-8 bg-slate-50 rounded-[2rem] border border-slate-200 border-dashed">
                            <p class="text-slate-500 font-bold">No pros online for this service right now.</p>
                            <p class="text-xs text-slate-400 mt-2">Go to Work tab and bring your profile online to test!</p>
                        </div>
                    </template>

                    <template x-for="worker in getAvailableWorkers()" :key="worker.id">
                        <div class="glass-panel p-5 rounded-[2rem] shadow-sm flex items-center justify-between border-2 border-transparent hover:border-indigo-100 transition-all">
                            <div class="flex items-center space-x-4">
                                <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center font-bold text-xl uppercase shadow-inner" x-text="worker.name.charAt(0)"></div>
                                <div>
                                    <h4 class="font-bold text-slate-800" x-text="worker.name"></h4>
                                    <div class="flex items-center text-sm mt-0.5">
                                        <span class="text-amber-500">★</span>
                                        <span class="font-bold text-slate-700 ml-1" x-text="worker.rating"></span>
                                        <span class="text-slate-400 ml-1 text-xs" x-text="'(' + worker.jobs + ' jobs)'"></span>
                                    </div>
                                </div>
                            </div>
                            <button @click="confirmBooking(worker)" class="bg-indigo-600 text-white font-bold px-5 py-2.5 rounded-xl text-sm shadow-md active:scale-95 transition-transform">Hire</button>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <div x-show="step === 'provider'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-6" x-transition:enter-end="opacity-100 translate-y-0" style="display: none;">
            
            <div x-show="!isProviderLogged" class="space-y-6">
                <div class="mb-8 mt-2">
                    <h2 class="text-[32px] font-extrabold leading-[1.15] tracking-tight">Become a <br><span class="bg-gradient-to-r from-indigo-600 to-violet-500 bg-clip-text text-transparent">Professional</span></h2>
                </div>
                <form @submit.prevent="registerWorker()" class="glass-panel p-6 rounded-[2rem] shadow-sm space-y-4">
                    <input required x-model="proData.name" type="text" placeholder="Full Name" class="w-full p-4 bg-white/60 border border-slate-200 rounded-2xl outline-none focus:border-indigo-500">
                    <input required x-model="proData.phone" type="tel" placeholder="Mobile Number" class="w-full p-4 bg-white/60 border border-slate-200 rounded-2xl outline-none focus:border-indigo-500">
                    
                    <div class="relative">
                        <select required x-model="proData.skill" class="no-arrow w-full p-4 bg-white/60 border border-slate-200 rounded-2xl outline-none focus:border-indigo-500 text-slate-700">
                            <option value="" disabled selected>Select Your Skill</option>
                            <template x-for="service in services">
                                <option :value="service.name" x-text="service.name"></option>
                            </template>
                        </select>
                        <svg class="w-5 h-5 text-slate-400 absolute right-4 top-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                    
                    <button type="submit" class="w-full bg-slate-900 text-white font-bold text-lg py-5 rounded-[1.5rem] shadow-lg active:scale-[0.98] transition-all">Create Profile</button>
                </form>
            </div>

            <div x-show="isProviderLogged" class="space-y-6">
                
                <div class="glass-panel p-5 rounded-[2rem] shadow-sm flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <div class="w-14 h-14 bg-gradient-to-br from-indigo-500 to-violet-600 text-white rounded-full flex items-center justify-center font-bold text-2xl uppercase shadow-inner" x-text="proData.name.charAt(0)"></div>
                        <div>
                            <h2 class="text-xl font-extrabold text-slate-800 leading-tight" x-text="proData.name"></h2>
                            <p class="text-indigo-600 font-bold text-xs uppercase tracking-widest mt-0.5" x-text="proData.skill"></p>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="flex items-center justify-end text-amber-500 text-lg">★<span class="font-black text-slate-800 ml-1" x-text="proData.rating.toFixed(1)"></span></div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1" x-text="proData.jobs + ' Jobs'"></p>
                    </div>
                </div>

                <div class="glass-panel p-4 rounded-[1.5rem] shadow-sm flex justify-between items-center border-l-4 transition-all duration-300" :class="proData.isOnline ? 'border-emerald-500' : 'border-slate-300'">
                    <div>
                        <h3 class="font-bold text-slate-800 text-sm" x-text="proData.isOnline ? 'Status: Online' : 'Status: Offline'"></h3>
                        <p class="text-[11px] font-medium mt-0.5" :class="proData.isOnline ? 'text-emerald-600' : 'text-slate-400'" x-text="proData.isOnline ? 'Visible to customers' : 'You are currently hidden'"></p>
                    </div>
                    <button @click="toggleOnline()" class="px-5 py-3 rounded-xl font-bold text-sm text-white shadow-md active:scale-95 transition-all" :class="proData.isOnline ? 'bg-rose-500 shadow-rose-500/30' : 'bg-emerald-500 shadow-emerald-500/30'" x-text="proData.isOnline ? 'Go Offline' : 'Go Online'"></button>
                </div>

                <div>
                    <h3 class="font-extrabold text-slate-800 mb-3 px-1 text-sm uppercase tracking-widest">Earnings Overview</h3>
                    <div class="grid grid-cols-3 gap-3">
                        <div class="glass-panel p-4 rounded-2xl text-center shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Today</p>
                            <p class="text-lg font-black text-emerald-600 mt-1">₹<span x-text="proData.earnings.today"></span></p>
                        </div>
                        <div class="glass-panel p-4 rounded-2xl text-center shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Month</p>
                            <p class="text-lg font-black text-slate-800 mt-1">₹<span x-text="proData.earnings.month"></span></p>
                        </div>
                        <div class="glass-panel p-4 rounded-2xl text-center shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Lifetime</p>
                            <p class="text-lg font-black text-indigo-600 mt-1">₹<span x-text="proData.earnings.lifetime"></span></p>
                        </div>
                    </div>
                </div>

                <div class="glass-panel p-5 rounded-[1.5rem] shadow-sm space-y-3">
                    <h3 class="font-bold text-slate-800 text-sm">Check Past Earnings</h3>
                    <div class="flex space-x-3">
                        <input type="date" x-model="calendarDate" @change="checkCalendarEarnings()" class="w-full p-3 bg-white/60 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 text-sm text-slate-700 font-medium">
                        <div class="bg-slate-800 text-white font-bold px-4 rounded-xl min-w-[90px] text-center flex items-center justify-center text-sm shadow-md">
                            ₹<span x-text="calendarEarnings"></span>
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="font-extrabold text-slate-800 mb-3 px-1 text-sm uppercase tracking-widest">My Bookings</h3>
                    <div class="space-y-3">
                        <template x-if="proBookings.length === 0">
                            <div class="text-center p-6 border-2 border-dashed border-slate-200 rounded-[1.5rem] text-slate-400 font-medium text-sm">
                                No jobs assigned yet.
                            </div>
                        </template>
                        <template x-for="job in proBookings.slice().reverse()" :key="job.id">
                            <div class="glass-panel p-5 rounded-[1.5rem] shadow-sm">
                                <div class="flex justify-between items-start mb-2">
                                    <div>
                                        <p class="font-extrabold text-slate-800 text-sm" x-text="job.customerName"></p>
                                        <p class="text-xs text-slate-500 font-medium mt-0.5" x-text="job.issue"></p>
                                    </div>
                                    <span class="bg-emerald-100 text-emerald-700 text-[9px] px-2.5 py-1 rounded-full font-bold uppercase tracking-widest">Completed</span>
                                </div>
                                <p class="text-[11px] text-slate-400 font-medium" x-text="'📍 ' + job.address"></p>
                                <div class="mt-3 pt-3 border-t border-slate-100 flex justify-between items-center">
                                    <span class="text-xs font-bold text-slate-400" x-text="job.date"></span>
                                    <span class="text-sm font-black text-emerald-600" x-text="'+ ₹' + job.amount"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <div x-show="step === 'confirmed'" x-transition:enter="transition ease-out duration-500" x-transition:enter-start="opacity-0 scale-90" x-transition:enter-end="opacity-100 scale-100" style="display: none;">
            <div class="text-center py-10 space-y-6 glass-panel rounded-[2rem] shadow-sm px-6 border-t-4 border-t-emerald-500">
                <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto animate-bounce shadow-inner">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <div>
                    <h2 class="text-2xl font-extrabold text-slate-800 mb-1">Pro Assigned!</h2>
                    <p class="text-slate-500 font-medium text-sm"><span class="font-bold text-indigo-600" x-text="assignedWorker?.name"></span> has accepted your job.</p>
                </div>
                <div class="pt-4 border-t border-slate-100 space-y-3">
                    <button class="w-full bg-slate-900 text-white font-bold py-4 rounded-[1.5rem] active:scale-[0.98] shadow-md">📞 Call Provider</button>
                    <button @click="step = 'rate_tip'" class="w-full bg-indigo-50 border border-indigo-200 text-indigo-600 font-bold py-4 rounded-[1.5rem] active:scale-[0.98] text-sm">(Demo) Mark Job Complete</button>
                </div>
            </div>
        </div>

        <div x-show="step === 'rate_tip'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-6" x-transition:enter-end="opacity-100 translate-y-0" style="display: none;">
            <div class="glass-panel p-8 rounded-[2rem] shadow-sm text-center space-y-6 border-t-4 border-t-amber-400">
                <h2 class="text-2xl font-extrabold text-slate-800">Job Done!</h2>
                <p class="text-slate-500 text-sm font-medium">Rate the service provided by <span class="font-bold text-indigo-600" x-text="assignedWorker?.name"></span></p>
                
                <div class="flex justify-center space-x-2 text-4xl">
                    <template x-for="star in [1,2,3,4,5]">
                        <button @click="rating = star" class="transition-colors drop-shadow-sm" :class="rating >= star ? 'star-active' : 'star-inactive'">★</button>
                    </template>
                </div>

                <div class="pt-6 border-t border-slate-100 text-left">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Add a Tip</p>
                    <div class="grid grid-cols-3 gap-3">
                        <template x-for="amt in [50, 100, 200]">
                            <button @click="tip = amt" class="py-3 rounded-[1rem] border-2 font-bold transition-all text-sm" :class="tip === amt ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'bg-white border-slate-200 text-slate-400 hover:border-slate-300'">₹<span x-text="amt"></span></button>
                        </template>
                    </div>
                </div>

                <button @click="finishProcess()" class="w-full bg-slate-900 text-white font-bold text-lg py-4 rounded-[1.5rem] shadow-lg active:scale-[0.98] transition-all">Submit & Pay</button>
            </div>
        </div>

        <div x-show="step === 'settings'" style="display: none;">
            <div class="space-y-6">
                <button @click="step = 'home'" class="flex items-center text-indigo-600 font-bold text-sm tracking-wide bg-indigo-50 px-4 py-2 rounded-full active:scale-95 transition-transform w-max">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg> Back
                </button>
                <h2 class="text-3xl font-extrabold text-slate-800">Settings</h2>
                <div class="glass-panel p-6 rounded-[2rem] shadow-sm space-y-4">
                    <button @click="window.location.reload()" class="w-full bg-rose-50 border border-rose-100 text-rose-600 font-bold py-4 rounded-2xl active:scale-95 transition-all">Clear Memory & Restart</button>
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 z-50 px-6 pb-6 pt-4 bg-gradient-to-t from-[#f8fafc] via-[#f8fafc]/90 to-transparent">
        <div class="glass-panel border border-white/60 rounded-[2rem] px-8 py-4 flex justify-around items-center shadow-[0_10px_40px_rgb(0,0,0,0.06)]">
            <button @click="step = 'home'" :class="step === 'home' ? 'text-indigo-600 scale-110' : 'text-slate-400'" class="flex flex-col items-center transition-all duration-300">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span class="text-[10px] font-extrabold mt-1">Home</span>
            </button>
            <button @click="step = 'provider'" :class="step === 'provider' ? 'text-indigo-600 scale-110' : 'text-slate-400'" class="flex flex-col items-center transition-all duration-300">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                <span class="text-[10px] font-extrabold mt-1">Work</span>
            </button>
        </div>
    </nav>

    <script>
        function app() {
            return {
                step: 'home', 
                userCity: 'Delhi NCR', 
                
                // Static Services
                selectedService: null,
                services: [
                    { name: 'Electrician', icon: '⚡', issues: ['AC Repair/Service', 'Cooler Repair', 'Short Circuit', 'New Wiring'] },
                    { name: 'Maid', icon: '🧹', issues: ['Daily Cleaning', 'Deep Cleaning', 'Cooking'] },
                    { name: 'Car Repair', icon: '🚗', issues: ['General Service', 'Breakdown/Towing', 'Puncture'] }
                ],
                
                // Booking Data
                formData: { name: '', address: '', issue: '' },
                assignedWorker: null,
                
                // Rating & Tip Data
                rating: 5,
                tip: 0,

                // Simulated Database of Workers
                dbWorkers: [
                    { id: 101, name: 'Suresh Kumar', skill: 'Electrician', rating: 4.8, jobs: 124, isOnline: true },
                    { id: 102, name: 'Priya Sharma', skill: 'Maid', rating: 4.9, jobs: 312, isOnline: true },
                    { id: 103, name: 'Ravi Singh', skill: 'Car Repair', rating: 4.5, jobs: 89, isOnline: false }
                ],

                // Provider Dashboard Data
                isProviderLogged: false,
                proData: { 
                    id: null, name: '', phone: '', skill: '', rating: 5.0, jobs: 0, isOnline: false,
                    earnings: { today: 0, month: 0, lifetime: 0 }
                },
                proBookings: [],
                
                // Calendar Data
                calendarDate: '',
                calendarEarnings: 0,

                // ---- CUSTOMER FLOW FUNCTIONS ----

                selectService(service) {
                    this.selectedService = service;
                    this.step = 'booking';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                },

                proceedToChooseWorker() {
                    this.step = 'choose_worker';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                },

                getAvailableWorkers() {
                    return this.dbWorkers.filter(w => w.skill === this.selectedService.name && w.isOnline === true);
                },

                confirmBooking(worker) {
                    this.assignedWorker = worker;
                    this.step = 'confirmed';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                },

                finishProcess() {
                    let totalEarned = 300 + this.tip;

                    if(this.isProviderLogged && this.assignedWorker.id === this.proData.id) {
                        this.proData.earnings.today += totalEarned;
                        this.proData.earnings.month += totalEarned;
                        this.proData.earnings.lifetime += totalEarned;
                        this.proData.jobs += 1;
                        this.proData.rating = ((this.proData.rating * (this.proData.jobs - 1)) + this.rating) / this.proData.jobs;

                        let todayStr = new Date().toLocaleDateString();
                        this.proBookings.push({
                            id: Date.now(),
                            customerName: this.formData.name,
                            issue: this.formData.issue,
                            address: this.formData.address,
                            amount: totalEarned,
                            date: todayStr
                        });
                    }

                    alert(`Done! Tip of ₹${this.tip} & ${this.rating}-star rating sent to ${this.assignedWorker.name}.`);
                    
                    this.step = 'home';
                    this.rating = 5;
                    this.tip = 0;
                    this.formData = { name: '', address: '', issue: '' };
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                },

                // ---- PROVIDER FUNCTIONS ----

                registerWorker() {
                    this.proData.id = 999; 
                    this.proData.earnings = { today: 0, month: 4500, lifetime: 24500 };
                    this.proData.rating = 5.0;
                    this.proData.jobs = 42;
                    
                    this.isProviderLogged = true;
                    this.dbWorkers.push(this.proData); 
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                },

                toggleOnline() {
                    this.proData.isOnline = !this.proData.isOnline;
                },

                checkCalendarEarnings() {
                    let today = new Date().toISOString().split('T')[0];
                    if(this.calendarDate === today) {
                        this.calendarEarnings = this.proData.earnings.today;
                    } else if (this.calendarDate) {
                        this.calendarEarnings = Math.floor(Math.random() * (1200 - 300 + 1) + 300); 
                    } else {
                        this.calendarEarnings = 0;
                    }
                }
            }
        }
    </script>
</body>
</html>
